openapi: 3.0.3

info:
  title: Products Management API
  version: "1.0.0"
  description: API per autenticazione utenti e gestione prodotti

servers:
  - url: "{{baseUrl}}"

tags:
  - name: Auth
  - name: Products
  - name: Users

security:
  - bearerAuth: []

paths:

  /auth/register:
    post:
      tags:
        - Auth
      summary: Registrazione utente

      security: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'

      responses:
        '201':
          description: Utente creato correttamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'

        '400':
          description: Utente già esistente o validazione fallita

  /auth/login:
    post:
      tags:
        - Auth
      summary: Login

      security: []

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'

      responses:
        '200':
          description: Login effettuato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'

        '400':
          description: Credenziali non valide

  /products:
    get:
      tags:
        - Products
      summary: Lista prodotti

      responses:
        '200':
          description: Lista completa prodotti
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Product'

        '401':
          description: Token non valido

    post:
      tags:
        - Products
      summary: Creazione prodotto

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddProductRequest'

      responses:
        '201':
          description: Prodotto creato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

        '400':
          description: Dati non validi

        '401':
          description: Token non valido

  /products/{id}:
    get:
      tags:
        - Products
      summary: Dettaglio prodotto

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          example: "684d55f3a92b9f88f1a4a123"

      responses:
        '200':
          description: Prodotto trovato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

        '404':
          description: Prodotto non trovato

    put:
      tags:
        - Products
      summary: Modifica prodotto

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'

      responses:
        '200':
          description: Prodotto aggiornato
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Product'

        '404':
          description: Prodotto non trovato

    delete:
      tags:
        - Products
      summary: Eliminazione prodotto

      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string

      responses:
        '200':
          description: Prodotto eliminato

        '404':
          description: Prodotto non trovato

components:

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:

    User:
      type: object

      properties:
        _id:
          type: string
          example: "684d55f3a92b9f88f1a4a001"

        firstName:
          type: string
          example: Mario

        lastName:
          type: string
          example: Rossi

        email:
          type: string
          example: mario.rossi@azienda.it

        role:
          type: string
          enum:
            - dipendente
            - responsabile
          example: responsabile

      required:
        - firstName
        - lastName
        - email
        - role

    RegisterRequest:
      type: object

      properties:
        firstName:
          type: string
          example: Mario

        lastName:
          type: string
          example: Rossi

        email:
          type: string
          example: mario.rossi@azienda.it

        role:
          type: string
          enum:
            - dipendente
            - responsabile
          example: dipendente

        password:
          type: string
          example: Password123!

      required:
        - firstName
        - lastName
        - email
        - role
        - password

    LoginRequest:
      type: object

      properties:
        email:
          type: string
          example: mario.rossi@azienda.it

        password:
          type: string
          example: Password123!

      required:
        - email
        - password

    LoginResponse:
      type: object

      properties:
        user:
          $ref: '#/components/schemas/User'

        token:
          type: string
          example: >
            eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9
            .eyJpZCI6IjEyMyIsInJvbGUiOiJyZXNwb25zYWJpbGUifQ
            .abcdefghijklmnopqrstuvxyz

    Product:
      type: object

      properties:
        _id:
          type: string
          example: "684d55f3a92b9f88f1a4a999"

        name:
          type: string
          example: Notebook Lenovo ThinkPad

        description:
          type: string
          example: Notebook aziendale 16GB RAM 512GB SSD

        price:
          type: number
          example: 1299.99

        quantity:
          type: integer
          example: 15

        createdAt:
          type: string
          format: date-time
          example: "2026-06-02T10:15:30.000Z"

        updatedAt:
          type: string
          format: date-time
          example: "2026-06-02T11:30:00.000Z"

    AddProductRequest:
      type: object

      properties:
        name:
          type: string
          example: Monitor Samsung 27"

        description:
          type: string
          example: Monitor IPS 27 pollici QHD

        price:
          type: number
          example: 349.99

        quantity:
          type: integer
          example: 25

      required:
        - name
        - description
        - price
        - quantity

    UpdateProductRequest:
      type: object

      properties:
        name:
          type: string
          example: Monitor Samsung 27" Pro

        description:
          type: string
          example: Monitor IPS professionale QHD

        price:
          type: number
          example: 399.99

        quantity:
          type: integer
          example: 30

x-postman-variable-examples:
  baseUrl: http://localhost:3000
  token: "{{token}}"