
<div class="page">

  <h1>Dettaglio film</h1>

  <div *ngIf="item$ | async as item; else loading" class="card">
    <p><strong>ID:</strong> {{ item.id }}</p>
    <p><strong>Nome:</strong> {{ item.name }}</p>
    <p><strong>Descrizione:</strong> {{ item.description }}</p>
    <p><strong>Rating:</strong> {{ item.rating }}</p>
    <p><strong>Data rilascio:</strong> {{ item.releaseDate | date:'dd/MM/yyyy' }}</p>
    <p><strong>Categoria:</strong> {{ getCategoryName(item.categoryID) }}</p>
  </div>

  <ng-template #loading>
    <p>Caricamento...</p>
  </ng-template>

  <button class="btn-back" routerLink="/film">Indietro</button>

</div>
